name: medline
description: MEDLINE - Medical Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.5.2

  # State Management & Utils
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  intl: ^0.20.2

  # UI & Icons
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0   # 4.9.0 → 4.10.0 (DmedScreen uchun)

  # PDF Hisobot uchun
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.5
  open_filex: ^4.5.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  webview_flutter_platform_interface: ^2.14.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/logo.png


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/logo.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/icon/logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icon/logo.png"